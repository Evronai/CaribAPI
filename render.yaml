# render.yaml - Render Blueprint for CaribAPI
# Deploy with: render blueprint launch

services:
  # Main API Service
  - type: web
    name: caribapi
    env: python
    region: oregon  # or: frankfurt, ohio, singapore
    plan: free  # free, starter, standard, pro
    
    # Build Configuration
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py
    
    # Health Check
    healthCheckPath: /health
    autoDeploy: true
    
    # Environment Variables
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: caribapi-db
          property: connectionString
      
      - key: SECRET_KEY
        generateValue: true
      
      - key: ALLOWED_ORIGINS
        value: "*"
      
      - key: API_TITLE
        value: CaribAPI
      
      - key: API_VERSION
        value: 1.0.0
      
      - key: API_DESCRIPTION
        value: Caribbean Business Data API
      
      - key: CONTACT_EMAIL
        value: contact@caribapi.com
    
    # Scaling
    numInstances: 1
    disk:
      name: data
      mountPath: /data
      sizeGB: 1

  # PostgreSQL Database
  - type: pgsql
    name: caribapi-db
    region: oregon
    plan: free  # free, starter, standard, pro
    ipAllowList: []  # Allow all (Render-managed)
    databaseName: caribapi
    user: caribapi
    
    # PostgreSQL version
    postgresMajorVersion: 15
    
    # Initialization (optional)
    initSQL: |
      -- Create additional extensions if needed
      CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

  # Redis Cache (Optional - comment out if not needed initially)
  # - type: redis
  #   name: caribapi-redis
  #   region: oregon
  #   plan: free  # free, starter, standard, pro
  #   ipAllowList: []
  #   maxmemoryPolicy: allkeys-lru
  #   persistence: disabled  # disabled, aof-every-sec, aof-every-write

# Cron Jobs (Scheduled Tasks)
jobs:
  # Daily data update
  - type: cron
    name: update-business-data
    env: python
    region: oregon
    schedule: "0 2 * * *"  # Daily at 2 AM UTC
    plan: free
    
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/update_data.py || echo "Update script completed"
    
    envVars:
      - key: DATABASE_URL
        fromService:
          name: caribapi-db
          type: pgsql
          property: connectionString
      
      - key: SECRET_KEY
        fromService:
          name: caribapi
          type: web
          property: envVar
          envVarKey: SECRET_KEY

